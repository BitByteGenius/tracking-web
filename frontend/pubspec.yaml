name: live_tracking_web
description: Live User Tracking System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # State Management
  provider: ^6.1.5

  # Routing
  go_router: ^16.0.0

  # Local Storage
  shared_preferences: ^2.5.3

  # JWT
  jwt_decoder: ^2.0.1

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1

  # Maps — TomTom via flutter_map tile layer (replaces google_maps_flutter)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  flutter_spinkit: ^5.2.2
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  intl: ^0.20.2

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  #assets:
  #  - assets/images/
  #  - assets/icons/